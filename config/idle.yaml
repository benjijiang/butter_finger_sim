# Butter Finger — simulation-only idle behavior
#
# This slow scan is the fallback when no person is being tracked. Its targets
# are in the calibrated domain, but its high-frequency non-blocking update
# pattern has not been approved for real hardware. A future attention
# controller can pause it while commanding person-follow targets, then call
# IdleController.resume() when the person is lost.

idle:
  pose: idle_ready
  scan_joint: base
  # Full base range (+/- 90 deg): the fallback scan sweeps the entire yaw
  # freedom so a lost face can be reacquired anywhere in reach.
  lower_rad: -1.5708
  upper_rad: 1.5708
  half_cycle_s: 5.0
