# Butter Finger — temporary geometry
#
# Primary dimensions below come from the user-provided dimensioned reference
# drawing dated 2026-07-15. They have not been independently checked against
# CAD or the physical arm. Cross-sections, radii, masses, and inertias remain
# placeholders. Regenerate the URDF after editing:
#
#     python scripts/generate_urdf.py
#
# Units: meters (SI).

# User-provided dimensions from the reference drawing.
base_height: 0.03253             # base bottom to base_joint
shoulder_joint_height: 0.07390   # absolute height above the base bottom
upper_arm_length: 0.1452         # shoulder_joint to elbow_joint
forearm_length: 0.100            # elbow_joint to wrist_joint
wrist_length: 0.049              # wrist_joint to camera/end tip

# Derived/visual-only placeholders (pure guesses, never measured)
link_width: 0.035
base_radius: 0.045        # footprint of the base cylinder
turret_radius: 0.020
camera_size: 0.020        # camera modeled as a small cube at the wrist tip

# Approximate masses in kilograms.
# PLACEHOLDERS: rough guesses with valid positive values so PyBullet's
# dynamics are stable. NOT suitable for payload, structural, or
# servo-torque conclusions.
masses_kg:
  base: 0.300
  turret: 0.050
  upper_arm: 0.080
  forearm: 0.080
  wrist: 0.040
  camera: 0.010
