# Butter Finger — named arm poses
#
# All values are joint positions in RADIANS within the shared calibrated
# command domain in config/joints.yaml.

poses:
  # Shared home pose. Its calibrated PWM values round to the recorded physical
  # home signals: base=1500, shoulder=2200, elbow=2490, wrist=1400 us.
  sim_home:
    base: 0.0
    shoulder: 0.0
    elbow: 0.065
    wrist: -1.571

  # Demonstration pose within the calibrated physical command domain.
  demo_reach:
    base: 0.8
    shoulder: -0.6
    elbow: -0.9
    wrist: 0.15

  # Neutral hand-off posture for conversational behavior. Emotional actions
  # begin and end here; the dynamic idle controller then resumes its slow base
  # scan. This is intentionally distinct from the CAD assembly's sim_home.
  idle_ready:
    base: 0.0
    shoulder: -0.3
    elbow: -0.5
    wrist: -1.0

  # Reusable full-body keyframes for emotional motion. Their names describe
  # expressive intent; speed and load behavior still require hardware testing.
  emotion_upright:
    base: 0.0
    shoulder: -0.55
    elbow: -0.75
    wrist: -0.9

  emotion_engaged:
    base: 0.0
    shoulder: -0.4
    elbow: -0.7
    wrist: -0.8

  emotion_recoil:
    base: 0.0
    shoulder: -0.8
    elbow: -1.35
    wrist: -0.7

  emotion_droop:
    base: 0.0
    shoulder: -0.12
    elbow: -0.25
    wrist: -1.85

  emotion_look_up:
    base: 0.0
    shoulder: -0.3
    elbow: -0.5
    wrist: -0.35

  emotion_guarded:
    base: 0.0
    shoulder: -0.72
    elbow: -1.15
    wrist: -1.35

  emotion_angry:
    base: 0.0
    shoulder: -0.2
    elbow: -0.65
    wrist: -1.45
