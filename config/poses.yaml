# Butter Finger — named simulation poses
#
# All values are SIMULATION joint positions in RADIANS.
#
# IMPORTANT: these poses are NOT derived from the recorded physical home PWM
# values in config/joints.yaml. No measured PWM-to-angle calibration exists,
# so no conversion is performed. Values use the simulation coordinates and
# zero offsets configured in config/joints.yaml.

poses:
  # Simulated home pose. Wrist keeps the old coordinate's -1.571 rad absolute
  # position; its activity range extends 0.5 rad farther in the negative direction.
  sim_home:
    base: 0.0
    shoulder: 0.0
    elbow: 0.0
    wrist: -1.571

  # Arbitrary demo pose used by examples/scripted_motion.py.
  # Values are within the configured simulation limits.
  demo_reach:
    base: 0.8
    shoulder: -0.6
    elbow: -0.9
    wrist: 0.4

  # Neutral hand-off posture for conversational behavior. Emotional actions
  # begin and end here; the dynamic idle controller then resumes its slow base
  # scan. This is intentionally distinct from the CAD assembly's sim_home.
  idle_ready:
    base: 0.0
    shoulder: -0.3
    elbow: -0.5
    wrist: -1.0

  # Reusable full-body keyframes for simulation-only emotional motion.
  # Their names describe expressive intent, not physically validated poses.
  emotion_upright:
    base: 0.0
    shoulder: -0.55
    elbow: -0.75
    wrist: -0.9

  emotion_engaged:
    base: 0.0
    shoulder: -0.4
    elbow: -0.7
    wrist: -0.8

  emotion_recoil:
    base: 0.0
    shoulder: -0.8
    elbow: -1.35
    wrist: -0.7

  emotion_droop:
    base: 0.0
    shoulder: -0.12
    elbow: -0.25
    wrist: -1.85

  emotion_look_up:
    base: 0.0
    shoulder: -0.3
    elbow: -0.5
    wrist: -0.35

  emotion_guarded:
    base: 0.0
    shoulder: -0.72
    elbow: -1.15
    wrist: -1.35

  emotion_angry:
    base: 0.0
    shoulder: -0.2
    elbow: -0.65
    wrist: -1.45
