# Butter Finger — joint configuration
#
# This project deliberately separates these configuration concepts. Never mix:
#
#   1. Simulation joint positions ....... radians (see config/poses.yaml)
#   2. Recorded physical PWM data ....... microseconds (historical, below)
#   3. Verified hardware limits ......... microseconds (tested, below)
#   4. Temporary simulation limits ...... radians (development-only, below)
#   5. Named poses ...................... config/poses.yaml
#   6. Named action sequences ........... config/actions.yaml (sim-only)
#   7. Dynamic idle behavior ............ config/idle.yaml (sim-only)
#
# There is NO PWM-to-angle conversion anywhere in this repository yet,
# because no measured angle calibration exists. Do not invent one.

joint_order: [base, shoulder, elbow, wrist]

# ---------------------------------------------------------------------------
# PHYSICAL HARDWARE DATA — NOT used by the simulator; this is the source of
# truth for the PWM hardware layer (src/butter_finger/backends/pwm_robot_arm.py)
# that drives the real arm on the Raspberry Pi.
# Hardware: Raspberry Pi 5 -> UART (/dev/ttyAMA0 @ 1000000) ->
#           Hiwonder RasAdapter5A V1.0 -> servo PWM
# ---------------------------------------------------------------------------
physical:
  controller: "Hiwonder RasAdapter5A V1.0 (UART from Raspberry Pi 5)"

  # Servo model per joint (confirmed by the user 2026-07-14). Model names
  # only — datasheet pulse/angle specs are deliberately NOT recorded here;
  # PWM-to-angle calibration must be measured on the real arm, never assumed.
  servo_models:
    base: "SG90"
    shoulder: "LD-1501MG"   # larger, higher-torque metal-gear servo
    elbow: "SG90"
    wrist: "SG90"

  # Confirmed PWM port mapping. Ports 2 and 6 are unused.
  pwm_ports:
    base: 1
    shoulder: 3
    elbow: 4
    wrist: 5
  unused_ports: [2, 6]

  # Recorded physical home signals in microseconds (historical calibration
  # data from the original Butter_Finger control code).
  home_pwm_us:
    base: 1500
    shoulder: 2200   # revalidated on the real machine 2026-07-13, see notes
    elbow: 2490
    wrist: 1400

  # Verified pulse ranges in microseconds, tested on the real machine.
  # base/elbow/wrist confirmed 2026-07-13; shoulder tested earlier.
  tested_pwm_limits_us:
    base:     {min: 505, max: 2495}
    shoulder: {min: 1200, max: 2220}
    elbow:    {min: 505, max: 2495}
    wrist:    {min: 505, max: 2495}

  notes:
    shoulder_home: >
      The recorded shoulder home value (2200 us) sits only 20 us below the
      tested maximum (2220 us). It was revalidated on the real machine on
      2026-07-13 and confirmed safe as the home position.
    recovered_code: >
      The original Pi control code (board_demo/butter_finger.py, class
      RobotArm) was recovered on 2026-07-14 and ported here as PWMRobotArm.
      It carried slightly narrower historical limits (510-2490 us,
      shoulder max 2215 us); the tested values above are authoritative and
      supersede them.
    motion_timing: >
      Real-machine timing validated by the original tests: single joint
      duration 2.0 s + 2.5 s settle; coordinated home move 3.0 s + 3.5 s;
      base sweep 1.0 s + 1.5 s.

# ---------------------------------------------------------------------------
# SIMULATION DATA (radians — used by PyBulletArm and the URDF generator)
# ---------------------------------------------------------------------------
simulation:
  # The SolidWorks-exported joint transforms define the CAD assembly pose at
  # 0 rad, so no additional simulation orientation offsets are applied. These
  # values are not PWM-to-angle calibration.
  zero_offset_rad:
    base: 0.0
    shoulder: 0.0
    elbow: 0.0
    wrist: 0.0

  # Development-only simulation limits. Shoulder and elbow were updated from
  # simulator range checks on 2026-07-16; these are NOT physical calibration.
  # The wrist range is shifted another 0.2 rad in the negative direction. It
  # now extends 0.5 rad past the configured -1.571 rad home position.
  # Zero radians is a mathematical joint coordinate, NOT a servo's electrical
  # midpoint.
  limits_rad:
    base:     {lower: -1.5708, upper: 1.5708}
    shoulder: {lower: -1.571, upper: 0.050}
    elbow:    {lower: -3.075, upper: 0.065}
    wrist:    {lower: -2.071, upper: 1.0708}

  # Position-control parameters (placeholders; not measured servo specs).
  control:
    max_force_nm: 5.0
    max_velocity_rad_s: 3.0
    control_rate_hz: 240      # simulation time step = 1 / control_rate_hz
