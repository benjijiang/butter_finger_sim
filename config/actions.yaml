# Butter Finger — named simulation actions
#
# All targets are absolute SIMULATION joint positions in RADIANS. These
# development-only actions are not calibrated for the physical arm and must
# never be sent to PWMRobotArm. A step may reference a full named pose from
# poses.yaml or provide targets_rad for only the joints that should move.

actions:
  home:
    description: "Move to the neutral simulated reference pose."
    steps:
      - pose: sim_home
        duration_s: 2.0

  demo_reach:
    description: "Move to the configured demonstration reach pose."
    steps:
      - pose: demo_reach
        duration_s: 2.5

  base_scan:
    description: "Center, scan left and right, then return the base to center."
    steps:
      - targets_rad: {base: 0.0}
        duration_s: 1.0
      - targets_rad: {base: -0.8}
        duration_s: 2.0
      - targets_rad: {base: 0.8}
        duration_s: 3.0
      - targets_rad: {base: 0.0}
        duration_s: 2.0

  reach_and_return:
    description: "Move from sim_home to demo_reach and return to sim_home."
    steps:
      - pose: sim_home
        duration_s: 2.0
      - pose: demo_reach
        duration_s: 2.5
      - pose: sim_home
        duration_s: 3.0

  wrist_up:
    description: "Tilt only the wrist to +0.6 rad."
    steps:
      - targets_rad: {wrist: 0.6}
        duration_s: 1.5

  wrist_down:
    description: "Tilt only the wrist to -0.6 rad."
    steps:
      - targets_rad: {wrist: -0.6}
        duration_s: 1.5

  # -------------------------------------------------------------------------
  # Conversational emotional gestures. Duration is part of the expression:
  # short steps read as alert or forceful; long steps read as gentle, tired,
  # or reflective. Every gesture starts and ends at idle_ready so a dynamic
  # idle controller can take over without returning to sim_home.
  # -------------------------------------------------------------------------

  greet:
    description: "Offer a friendly, evenly paced side-to-side greeting."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - targets_rad: {base: -0.45, wrist: -0.85}
        duration_s: 0.7
      - targets_rad: {base: 0.45, wrist: -1.1}
        duration_s: 1.0
      - targets_rad: {base: -0.35, wrist: -0.85}
        duration_s: 0.8
      - pose: idle_ready
        duration_s: 0.8

  nod_yes:
    description: "Give two short, steady camera nods for agreement."
    steps:
      - pose: idle_ready
        duration_s: 0.7
      - targets_rad: {wrist: -1.55}
        duration_s: 0.35
      - targets_rad: {wrist: -0.75}
        duration_s: 0.42
      - targets_rad: {wrist: -1.55}
        duration_s: 0.35
      - targets_rad: {wrist: -0.75}
        duration_s: 0.42
      - pose: idle_ready
        duration_s: 0.8

  shake_no:
    description: "Give a quick, decisive double shake for disagreement."
    steps:
      - pose: idle_ready
        duration_s: 0.7
      - targets_rad: {base: -0.38}
        duration_s: 0.32
      - targets_rad: {base: 0.38}
        duration_s: 0.48
      - targets_rad: {base: -0.38}
        duration_s: 0.48
      - targets_rad: {base: 0.38}
        duration_s: 0.48
      - pose: idle_ready
        duration_s: 0.7

  attentive:
    description: "Lean in slowly and hold a steady listening posture."
    steps:
      - pose: idle_ready
        duration_s: 0.7
      - pose: emotion_engaged
        duration_s: 1.5
      - pose: emotion_engaged
        duration_s: 1.2
      - pose: idle_ready
        duration_s: 1.2

  happy:
    description: "Rise into light, even bounces with cheerful side motion."
    steps:
      - pose: idle_ready
        duration_s: 0.6
      - pose: emotion_upright
        duration_s: 0.6
      - targets_rad: {base: -0.3, wrist: -0.72}
        duration_s: 0.45
      - targets_rad: {base: 0.3, wrist: -1.02}
        duration_s: 0.45
      - targets_rad: {base: -0.25, wrist: -0.72}
        duration_s: 0.4
      - targets_rad: {base: 0.25, wrist: -1.02}
        duration_s: 0.4
      - pose: idle_ready
        duration_s: 0.9

  excited:
    description: "Burst upward into increasingly quick looks and bounces."
    steps:
      - pose: idle_ready
        duration_s: 0.5
      - pose: emotion_upright
        duration_s: 0.35
      - targets_rad: {base: -0.42, wrist: -0.55}
        duration_s: 0.34
      - targets_rad: {base: 0.42, wrist: -1.05}
        duration_s: 0.3
      - targets_rad: {base: -0.32, wrist: -0.58}
        duration_s: 0.26
      - targets_rad: {base: 0.32, wrist: -1.0}
        duration_s: 0.22
      - pose: idle_ready
        duration_s: 0.8

  proud:
    description: "Rise deliberately, hold high, and return with composure."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - pose: emotion_upright
        duration_s: 1.2
      - pose: emotion_upright
        duration_s: 1.4
      - pose: idle_ready
        duration_s: 1.2

  playful:
    description: "Peek from side to side with a syncopated short-long-short rhythm."
    steps:
      - pose: idle_ready
        duration_s: 0.6
      - targets_rad: {base: -0.5, wrist: -0.62}
        duration_s: 0.35
      - targets_rad: {base: -0.5, wrist: -0.62}
        duration_s: 0.25
      - targets_rad: {base: 0.45, wrist: -1.3}
        duration_s: 0.9
      - targets_rad: {base: 0.45, wrist: -1.3}
        duration_s: 0.35
      - targets_rad: {base: -0.2, wrist: -0.78}
        duration_s: 0.35
      - pose: idle_ready
        duration_s: 0.9

  affectionate:
    description: "Approach gently, linger warmly, and withdraw just as slowly."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - pose: emotion_engaged
        duration_s: 2.0
      - targets_rad: {base: -0.16, wrist: -0.7}
        duration_s: 0.8
      - targets_rad: {base: -0.16, wrist: -0.7}
        duration_s: 1.2
      - pose: idle_ready
        duration_s: 1.8

  shy:
    description: "Turn down and away slowly, then make a quick timid peek."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - targets_rad: {base: 0.55, shoulder: -0.15, elbow: -0.3, wrist: -1.7}
        duration_s: 1.8
      - targets_rad: {base: 0.55, shoulder: -0.15, elbow: -0.3, wrist: -1.7}
        duration_s: 0.7
      - targets_rad: {base: 0.15, wrist: -1.15}
        duration_s: 0.35
      - targets_rad: {base: 0.15, wrist: -1.15}
        duration_s: 0.4
      - targets_rad: {base: 0.55, wrist: -1.7}
        duration_s: 0.7
      - pose: idle_ready
        duration_s: 1.3

  curious:
    description: "Lean closer, pause, and inspect from two uneven angles."
    steps:
      - pose: idle_ready
        duration_s: 0.7
      - pose: emotion_engaged
        duration_s: 1.0
      - targets_rad: {base: -0.25, wrist: -0.62}
        duration_s: 0.6
      - targets_rad: {base: -0.25, wrist: -0.62}
        duration_s: 0.4
      - targets_rad: {base: 0.25, wrist: -1.0}
        duration_s: 0.85
      - targets_rad: {base: 0.25, wrist: -1.0}
        duration_s: 0.4
      - pose: idle_ready
        duration_s: 1.0

  thinking:
    description: "Look up and aside slowly, then remain in a long reflective pause."
    steps:
      - pose: idle_ready
        duration_s: 0.7
      - pose: emotion_look_up
        duration_s: 2.0
      - targets_rad: {base: 0.35}
        duration_s: 1.2
      - targets_rad: {base: 0.35, shoulder: -0.3, elbow: -0.5, wrist: -0.35}
        duration_s: 1.5
      - pose: idle_ready
        duration_s: 1.5

  confused:
    description: "Alternate mismatched side tilts with an intentionally hesitant rhythm."
    steps:
      - pose: idle_ready
        duration_s: 0.6
      - targets_rad: {base: -0.3, wrist: -0.62}
        duration_s: 0.45
      - targets_rad: {base: -0.3, wrist: -0.62}
        duration_s: 0.25
      - targets_rad: {base: 0.35, wrist: -1.25}
        duration_s: 0.85
      - targets_rad: {base: 0.35, wrist: -1.25}
        duration_s: 0.45
      - targets_rad: {base: -0.2, wrist: -0.75}
        duration_s: 0.55
      - pose: idle_ready
        duration_s: 1.0

  sad:
    description: "Sink into a deep droop, hold, and recover very slowly."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - pose: emotion_droop
        duration_s: 2.8
      - pose: emotion_droop
        duration_s: 1.2
      - pose: idle_ready
        duration_s: 2.6

  disappointed:
    description: "Droop first, then add a restrained and slow head shake."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - pose: emotion_droop
        duration_s: 2.0
      - targets_rad: {base: -0.18}
        duration_s: 0.75
      - targets_rad: {base: 0.18}
        duration_s: 1.0
      - targets_rad: {base: 0.0}
        duration_s: 0.75
      - pose: emotion_droop
        duration_s: 0.6
      - pose: idle_ready
        duration_s: 2.0

  bored:
    description: "Slump into a lazy side glance with deliberately long pauses."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - pose: emotion_droop
        duration_s: 2.5
      - targets_rad: {base: 0.5, wrist: -1.65}
        duration_s: 1.8
      - targets_rad: {base: 0.5, shoulder: -0.12, elbow: -0.25, wrist: -1.65}
        duration_s: 1.4
      - targets_rad: {base: -0.2, wrist: -1.8}
        duration_s: 2.0
      - targets_rad: {base: -0.2, shoulder: -0.12, elbow: -0.25, wrist: -1.8}
        duration_s: 0.8
      - pose: idle_ready
        duration_s: 2.0

  sleepy:
    description: "Nod off repeatedly, with each droop slower and deeper than the last."
    steps:
      - pose: idle_ready
        duration_s: 0.8
      - targets_rad: {wrist: -1.4}
        duration_s: 1.8
      - targets_rad: {wrist: -0.95}
        duration_s: 0.9
      - targets_rad: {shoulder: -0.2, elbow: -0.35, wrist: -1.65}
        duration_s: 2.4
      - targets_rad: {shoulder: -0.28, elbow: -0.48, wrist: -1.05}
        duration_s: 1.1
      - pose: emotion_droop
        duration_s: 3.0
      - pose: emotion_droop
        duration_s: 1.0
      - pose: idle_ready
        duration_s: 2.5

  surprised:
    description: "Snap backward, freeze in surprise, then recover cautiously."
    steps:
      - pose: idle_ready
        duration_s: 0.5
      - pose: emotion_recoil
        duration_s: 0.22
      - pose: emotion_recoil
        duration_s: 0.65
      - pose: idle_ready
        duration_s: 1.4

  scared:
    description: "Recoil instantly, tremble in place, and hurry back to idle."
    steps:
      - pose: idle_ready
        duration_s: 0.5
      - pose: emotion_guarded
        duration_s: 0.2
      - targets_rad: {base: -0.14, wrist: -1.45}
        duration_s: 0.14
      - targets_rad: {base: 0.14, wrist: -1.25}
        duration_s: 0.12
      - targets_rad: {base: -0.12, wrist: -1.45}
        duration_s: 0.12
      - targets_rad: {base: 0.12, wrist: -1.25}
        duration_s: 0.11
      - targets_rad: {base: -0.08, wrist: -1.4}
        duration_s: 0.1
      - pose: idle_ready
        duration_s: 1.2

  angry:
    description: "Drive forward sharply, glare, and punctuate it with hard short shakes."
    steps:
      - pose: idle_ready
        duration_s: 0.5
      - pose: emotion_angry
        duration_s: 0.3
      - pose: emotion_angry
        duration_s: 1.0
      - targets_rad: {base: -0.24}
        duration_s: 0.2
      - targets_rad: {base: 0.24}
        duration_s: 0.2
      - targets_rad: {base: -0.2}
        duration_s: 0.18
      - targets_rad: {base: 0.0}
        duration_s: 0.25
      - pose: idle_ready
        duration_s: 1.0
